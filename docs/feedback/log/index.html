<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thanks for the Feedback — Reading Log</title>
  <link rel="stylesheet" href="https://k1monfared.github.io/site_kit/css/base.css">
  <link rel="stylesheet" href="../../shared/loglog-viewer.css?v=20260508e">
  <script src="https://k1monfared.github.io/site_kit/js/theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 0;
    }

    .page-header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 0;
      height: 56px;
      display: flex;
      align-items: center;
    }

    .page-header-inner {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .back-link:hover {
      color: var(--link);
    }

    .page-header-title {
      flex: 1;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      border-color: var(--link);
      color: var(--link);
    }

    #app {
      max-width: 900px;
      margin: 0 auto;
    }

    #hdr {
      top: 56px !important;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="page-header-inner">
      <a class="back-link" href="../../">&#8592; Marginalia</a>
      <span class="page-header-title">Stone &amp; Heen — Thanks for the Feedback</span>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="moon-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="sun-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="app"></div>

  <script src="../../shared/loglog-viewer.js?v=20260508e"></script>
  <script>
    createLoglogViewer(document.getElementById('app'), {
      title: 'Stone & Heen — Thanks for the Feedback',
      dataFile: '../../data/feedback.loglog',
    });

    (function() {
      const btn = document.getElementById('theme-toggle');
      const moonIcon = btn.querySelector('.moon-icon');
      const sunIcon = btn.querySelector('.sun-icon');

      function updateIcons() {
        const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
        moonIcon.style.display = isDark ? 'block' : 'none';
        sunIcon.style.display = isDark ? 'none' : 'block';
      }

      btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        if (current === 'light') {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
        }
        updateIcons();
      });

      updateIcons();
    })();
  </script>
</body>
</html>
